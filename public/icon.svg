<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="black" rx="64"/>
  <text x="230" y="230" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="700" fill="white" text-anchor="end" dominant-baseline="middle">Smart</text>
  <rect x="240" y="186" width="196" height="88" rx="12" ry="12" fill="white"/>
  <text x="338" y="230" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="700" fill="black" text-anchor="middle" dominant-baseline="middle">Scale</text>
  <text x="256" y="330" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="400" letter-spacing="6" fill="#ffde21" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">Dashboard 2.0</text>
</svg>
